<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calculator</title>
	<link rel="stylesheet" href="css/normalize.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="css/style.css">
	<script src="app.js" defer></script>
</head>
<body>
	<div class="container">
		<main class="main">
			<div class="calculator">
				<div class="screen">
					<div class="display" id="result"></div>
				</div>
				<div class="buttons-grid">
					<button class="btn green" id="clearBtn">AC</button>
					<button class="btn blue" id="parenthesis">()</button>
					<button class="btn blue" id="operator">%</button>
					<button class="btn blue" id="operator">/</button>

					<button class="btn" id="num">7</button>
					<button class="btn" id="num">8</button>
					<button class="btn" id="num">9</button>
					<button class="btn blue" id="operator">x</button>

					<button class="btn" id="num">4</button>
					<button class="btn" id="num">5</button>
					<button class="btn" id="num">6</button>
					<button class="btn blue" id="operator">-</button>

					<button class="btn" id="num">1</button>
					<button class="btn" id="num">2</button>
					<button class="btn" id="num">3</button>
					<button class="btn blue" id="operator">+</button>

					<button class="btn" id="num">0</button>
					<button class="btn" id="dot">.</button>
					<button class="btn" id="del">←</button>
					<button class="btn purple" id="equal">=</button>
				</div>
			</div>
		</main>

		<footer class="footer">
		  <a href="https://github.com/dnb777" class="profile-link" target="_blank">
		    <svg xmlns="http://www.w3.org/2000/svg" class="icon icon-tabler icon-tabler-brand-github" width="30" height="30" viewBox="0 0 24 24" stroke-width="1.5" stroke="#FFFFFF" fill="none" stroke-linecap="round" stroke-linejoin="round">
		      <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
		      <path d="M9 19c-4.3 1.4 -4.3 -2.5 -6 -3m12 5v-3.5c0 -1 .1 -1.4 -.5 -2c2.8 -.3 5.5 -1.4 5.5 -6a4.6 4.6 0 0 0 -1.3 -3.2a4.2 4.2 0 0 0 -.1 -3.2s-1.1 -.3 -3.5 1.3a12.3 12.3 0 0 0 -6.2 0c-2.4 -1.6 -3.5 -1.3 -3.5 -1.3a4.2 4.2 0 0 0 -.1 3.2a4.6 4.6 0 0 0 -1.3 3.2c0 4.6 2.7 5.7 5.5 6c-.6 .6 -.6 1.2 -.5 2v3.5" />
		    </svg>
		    <p class="contact-text">dnb777</p>
		  </a>

		  <a href="https://www.theodinproject.com/lessons/foundations-calculator">
		    <p class="contact-text">For The Odin Project &copy</p>
		  </a>
		</footer>
	</div>
</body>
</html>
